 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Demand Paging Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>DEMAND PAGING</h1>

<div class="card">

<label>Number of Frames</label>
<input type="number" id="frames">

<label>Reference String</label>
<input type="text" id="refString" placeholder="7,0,1,2,0,3,0,4">

<button onclick="run()">RUN SIMULATION</button>

</div>

<div class="card info">
    <h3 id="currentPage">Processing Page: -</h3>
    <p id="explanation">Step explanation will appear here</p>
</div>

<div class="card legend">
    <span class="faultBox"></span> Page Fault
    <span class="hitBox"></span> Page Hit
</div>

<div class="card">
    <h3>Frame Table</h3>
    <table id="table"></table>
</div>

<div class="card stats">
    <p id="faults">Page Faults: 0</p>
    <p id="hits">Page Hits: 0</p>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
